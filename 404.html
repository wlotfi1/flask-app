{% extends "base.html" %}

{% block title %}404 - Not Found | {{ site_config.site_name }}{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-code">404</div>
    <h1 class="error-title">Oof! Page Not Found</h1>
    <p class="error-desc">The item or page you are looking for has vanished or never existed.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">Respawn at Home</a>
</div>
{% endblock %}
